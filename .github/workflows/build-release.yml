name: build-release
run-name: build-release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read versions
        id: versions
        run: |
          PREV_VERSION=$(
            git show HEAD~1:pyproject.toml |
            python -c 'import tomllib,sys; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
          )
          CUR_VERSION=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )

          echo "prev=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CUR_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version change
        id: check
        run: |
          if [ "${{ steps.versions.outputs.prev }}" = "${{ steps.versions.outputs.current }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Find previous version commit and tag it
        id: tag
        if: steps.check.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.versions.outputs.prev }}"
                  
          TARGET_COMMIT=$(
            git log --pretty=format:%H -- pyproject.toml | while read commit; do
              prev=$(git show "${commit}^:pyproject.toml" 2>/dev/null | \
                python -c 'import tomllib,sys; print(tomllib.loads(sys.stdin.read())["project"]["version"])' 2>/dev/null)
                  
              curr=$(git show "${commit}:pyproject.toml" | \
                python -c 'import tomllib,sys; print(tomllib.loads(sys.stdin.read())["project"]["version"])')
                  
              if [ "$prev" != "$curr" ] && [ "$curr" = "${{ steps.versions.outputs.prev }}" ]; then
                echo "$commit"
                break
              fi
            done
          )
                  
          if [ -z "$TARGET_COMMIT" ]; then
            echo "Could not find matching commit for version $TAG"
            exit 1
          fi
                  
          git tag "$TAG" "$TARGET_COMMIT"
          git push origin "$TAG"
                  
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate macOS icon (.icns)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install inkscape

          inkscape assets/icon.svg --export-filename=assets/icon_1024.png --export-width=1024

          mkdir -p icon.iconset

          sips -z 16 16     assets/icon_1024.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon_1024.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon_1024.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon_1024.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon_1024.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon_1024.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon_1024.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon_1024.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon_1024.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon_1024.png --out icon.iconset/icon_512x512@2x.png

          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Create virtual environment
        run: |
          python -m venv venv
          mkdir dist

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyside6

      - name: Build desktop app (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source venv/bin/activate
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            pyside6-deploy -c pysidedeploy.macos.spec --force
          else
            pyside6-deploy -c pysidedeploy.linux.spec --force
          fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install pyside6

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          venv\Scripts\Activate.ps1
          pyside6-deploy -c pysidedeploy.windows.spec --force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrocyCodePrintpage-${{ runner.os }}
          path: |
            dist/**

  release:
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    if: needs.version.outputs.changed == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release assets
        shell: bash
        run: |
          cd dist
              
          for d in GrocyCodePrintpage-*; do
            zip -r "$d.zip" "$d/"*
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: dist/*.zip
