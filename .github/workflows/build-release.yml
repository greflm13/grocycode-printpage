name: build-release
run-name: build-release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      tag: ${{ steps.detect.outputs.tag }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Detect previous version and tag it
        id: detect
        run: |
          set -euo pipefail
                  
          CURRENT_VERSION=$(python -c '
          import tomllib
          with open("pyproject.toml", "rb") as f:
          	print(tomllib.load(f)["project"]["version"])
          ')

          echo "Current version: $CURRENT_VERSION"

          LAST_COMMIT_OF_PREV=""
          PREV_VERSION=""
          PREV_COMMIT=""

          for COMMIT in $(git rev-list HEAD); do
          	VERSION_AT_COMMIT=$(git show "$COMMIT:pyproject.toml" 2>/dev/null | python -c '
          import sys, tomllib
          try:
          	print(tomllib.loads(sys.stdin.read())["project"]["version"])
          except Exception:
          	pass')

          	[ -z "$VERSION_AT_COMMIT" ] && continue

          	if [ "$VERSION_AT_COMMIT" != "$CURRENT_VERSION" ]; then
          		PREV_VERSION="$VERSION_AT_COMMIT"
          		LAST_COMMIT_OF_PREV="$PREV_COMMIT"
          		break
          	fi

          	PREV_COMMIT="$COMMIT"
          done

          if [ -z "$PREV_VERSION" ]; then
          	echo "No previous version found"
          	echo "changed=false" >>"$GITHUB_OUTPUT"
          	exit 0
          fi

          echo "Previous version: $PREV_VERSION"
          echo "Last commit of previous version: $LAST_COMMIT_OF_PREV"

          TAG="v$PREV_VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
          	echo "Tag $TAG already exists"
          	echo "changed=false" >>"$GITHUB_OUTPUT"
          	exit 0
          fi

          git tag "$TAG" "$LAST_COMMIT_OF_PREV"
          git push origin "$TAG"

          echo "changed=true" >>"$GITHUB_OUTPUT"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "version=$PREV_VERSION"

      - name: Create draft release
        if: steps.detect.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          draft: true
          prerelease: false

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64

          - runner: ubuntu-latest
            os: linux
            arch: arm64

          - runner: windows-latest
            os: windows
            arch: x64

          - runner: macos-latest
            os: macos
            arch: x64

          - runner: macos-latest
            os: macos
            arch: arm64

    runs-on: ${{ matrix.runner }}
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate macOS icon (.icns)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install inkscape

          inkscape assets/icon.svg --export-filename=assets/icon_1024.png --export-width=1024

          mkdir -p icon.iconset

          sips -z 16 16     assets/icon_1024.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon_1024.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon_1024.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon_1024.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon_1024.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon_1024.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon_1024.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon_1024.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon_1024.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon_1024.png --out icon.iconset/icon_512x512@2x.png

          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Create virtual environment
        run: |
          python -m venv venv
          mkdir dist

      - name: Generate version module
        shell: bash
        run: |+
          VERSION="${{ needs.version.outputs.version }}"
          echo "APP_VERSION = \"$VERSION\"" > modules/_version.py

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyside6

      - name: Build desktop app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          source venv/bin/activate
          pyside6-deploy -c pysidedeploy.linux.spec --force

          cd dist
          FILE=$(ls | head -n 1)

          EXT="${FILE##*.}"
          mv "$FILE" "GrocyCodePrintpage-linux-${{ matrix.arch }}.${EXT}"

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          source venv/bin/activate
          pyside6-deploy -c pysidedeploy.macos.spec --force
          pushd dist > /dev/null
          APP_BUNDLE=$(find . -maxdepth 2 -name "*.app" -type d | head -n 1)
          if [[ -z "$APP_BUNDLE" ]]; then
            echo "No .app bundle found in dist/"
            find . -maxdepth 3 -print
            exit 1
          fi
          APP_BUNDLE=$(basename "$APP_BUNDLE")
          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" "GrocyCodePrintpage-macos-${{ matrix.arch }}.zip"
          popd > /dev/null

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install pyside6

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          venv\Scripts\Activate.ps1
          pyside6-deploy -c pysidedeploy.windows.spec --force

          Set-Location dist
          $file = Get-ChildItem | Select-Object -First 1
          $ext = $file.Extension
          Rename-Item $file "GrocyCodePrintpage-windows-${{ matrix.arch }}$ext"

      - name: Upload macOS asset to GitHub Release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: dist/*.zip

      - name: Upload Linux asset to GitHub Release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: dist/**

      - name: Upload Windows asset to GitHub Release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: dist/**
          draft: true

  finalize-release:
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    if: needs.version.outputs.changed == 'true'
    steps:
      - name: Finalize release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          draft: false
          make_latest: true
          generate_release_notes: true
