  release:
    # needs: [ desktop, android ]
    needs: desktop
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release assets
        shell: bash
        run: |+
          cd dist
              
          for d in desktop-*; do
            zip -r "$d.zip" "$d"
          done
              
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.zip
